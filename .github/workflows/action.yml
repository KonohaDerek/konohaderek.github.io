name: DeployToGitHubPages
env:
  PUBLISH_DIR: src/public

permissions:
  contents: write
  
on:
  # push 到 main 分支時會觸發
   push:
    branches: [ master ]
    paths-ignore:
      - conversations/**
      - prompt/**
      - scripts/**
      - .github/workflows/ai-blog.yml
   workflow_run:
    workflows: ["Generate Blog Posts"]
    branches: [ master ]
    types:
      - completed

jobs:
  build:
    if: |
      (github.event_name == 'push' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        submodules: recursive  # Fetch Hugo themes recursively
        fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

    - name: Create cname file
      run: echo "www.k-derek.dev" > src/static/CNAME

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: '0.111.3'
        # extended: true

    - name: Build
      run: hugo --minify --config=config.toml --source=src

    - name: Deploy to gh-pages
      if: success()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ${{ env.PUBLISH_DIR }}
